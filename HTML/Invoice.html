<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Invoice</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="./NavCatFoot.css">
    <link rel="stylesheet" href="./card.css">
    <script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>

    <style>
        .invoice-box {
            max-width: 800px;
            margin: 50px auto;
            padding: 30px;
            border: 1px solid #eee;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.15);
            font-family: 'Helvetica Neue', 'Helvetica', Helvetica, Arial, sans-serif;
            background: #b3cfe5;
        }
        .invoice-header { border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .item-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .item-table th { background: #4a7fa7; text-align: left; padding: 10px; }
        .item-table td { padding: 10px; border-bottom: 1px solid #eee; }
        .total-row { font-size: 20px; font-weight: bold; text-align: right; margin-top: 20px; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>
    <div class="navbar"></div>
    <div class="invoice-box" id="printable-invoice">
        <div class="invoice-header">
            <h2>LMS Enrollment Receipt</h2>
            <p><strong>Enrollment ID:</strong> <span id="disp-enroll-id"></span></p>
            <p><strong>Date:</strong> <span id="disp-date"></span></p>
        </div>

        <table class="item-table">
            <thead>
                <tr>
                    <th>Course ID</th>
                    <th>Course Name</th>
                    <th>Amount</th>
                </tr>
            </thead>
            <tbody id="invoice-items">
                </tbody>
        </table>

        <div class="total-row">
            Total Paid: ₹<span id="disp-total"></span>
        </div>
        
        <div style="margin-top: 30px;" class="no-print">
            <button class="btn-add" onclick="window.print()" style="padding: 10px 20px; cursor:pointer;">Print Invoice</button>
            <button class="btn-add" onclick="window.location.href='StudentHome.html'" style="padding: 10px 20px; cursor:pointer;">Back to Home</button>
        </div>
    </div>
    <div class="footer"></div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../Script/invoice.js"></script>
    <script src="../Script/NavFoot.js"></script>

</body>
</html>
