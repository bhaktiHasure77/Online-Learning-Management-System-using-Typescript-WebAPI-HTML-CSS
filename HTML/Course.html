<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="./NavCatFoot.css">
    <link rel="stylesheet" href="./card.css">
    <!-- Jquery -->
    <script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
   <style>
body {
    margin: 0;
    padding: 0;
    background-color: #b3cfe5;
    /* fdf8f2; */
      font-family: "Georgia", serif;

    
}

/* PAGE TITLE */
h2 {
    text-align: center;
    margin-top: 20px;
    color: #1b2a2c;
}

/* MAIN CONTAINER */
.container {
 margin: 50px 200px 80px 180px;
     padding: 35px;
    width: 1100px;
    height: 700px;
    background-color: #4a7fa7;
    display: flex;
    gap: 30px;
    border-radius: 12px;
    box-shadow: 0px 4px 12px rgba(0,0,0,0.2);
}

/* IMAGE SECTION */
.image img {
    height: 570px;
    width: 450px;
    object-fit: cover;
    border-radius: 10px;
    border: 3px solid #666565;
}

/* FORM SECTION */
.product {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 20x;
    align-items: start;
}

/* EACH ROW */
.field {
    display: grid;
    grid-template-columns: 160px 300px; /* reduced input width */
    align-items: center;
    column-gap: 20px;
    padding: 8px;
    margin: 3px;
    border: 2px solid #66656591;
    border-radius: 6px;
    background-color: #b3cfe5;
}

/* LABEL */
.field label {
    text-align: left;
    font-weight: bold;
    color: #1f2d2f;
    padding: 8px;
    background-color: #b3cfe5;
    border-radius: 4px;
}

/* INPUTS */
.field input,
.field select,
.field textarea {
    padding: 8px;
    border: 2px solid #3f3f3f;
    border-radius: 6px;
    font-size: 13px;
    outline: none;
    background-color: #f0f7f6;
    width: 100%;
}

/* FOCUS EFFECT */
.field input:focus,
.field select:focus,
.field textarea:focus {
    border-color: #2f5f66;
    box-shadow: 0 0 5px rgba(47, 95, 102, 0.5);
}

/* BUTTON CONTAINER */
.buttons {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    margin-top: 25px;
    width: 100%;
}

/* BUTTONS */
button {
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    background-color: #8ca9c0;
    padding: 17px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    color: #000000;
    transition: 0.3s;
    font-size: 13px;
}

button:hover {
    background-color: #b3cfe5;
    color: #000000;
}
</style>


</head>
<body>
    <div class="navbar"></div>
    <div class="main">
            <h2>Course Manager</h2>
            <div class="container">
                 <div class="image">
                    <img id="imgCourse" src="" />
                </div>
                <div class="product">
                    <div class="field">
                        <label>Course ID:</label> 
                        <select id="ddlcourseID"></select>
                    </div>

                    <div class="field">
                        <label>Course Name:</label>
                        <input type="text" id="txtName" required>
                    </div>

                    <div class="field">
                        <label>Category :</label>
                        <select id="ddlCategory" required></select>
                    </div>

                    <div class="field">
                        <label>Course Cover:</label>
                        <input type="file" id="txtImage" required>
                    </div>

                    <div class="field">
                        <label>Price:</label>
                        <input type="text" id="txtPrice" required>
                    </div>

                    <div class="field">
                        <label>Description:</label>
                        <textarea id="courseDescription" rows="2" required></textarea>
                    </div>

                    <div class="buttons" style="margin: 20px; display: flexbox;">
                        <button type="button" onclick="addCourse()" >Add Product</button>
                        <button type="button" onclick="Save()" > Save Details</button><br>
                        <button type="button" onclick="Edit()" >Edit Details</button>
                        <button  type="button" onclick="updateCourse()" >Update Details</button><br>
                        <button  type="button" onclick="deleteCourse()" >Delete Product</button>
                        </div>
                    </div>
                </div>
            </div>
    <div class="footer"></div>
</body>

<script src="../Script/NavFoot.js"></script>

<script src="../Script/Course.js"></script>
<script src="../Script/func.js"></script>
</html>
